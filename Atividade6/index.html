<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificador de Triângulos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-4xl w-full grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
            <h1 class="text-xl font-semibold mb-6">Verificar Triângulo - Apenas Números</h1>
            <form id="triangle-form" class="space-y-4">
                <div>
                    <label for="sideA" class="block text-sm font-medium mb-1">Lado A</label>
                    <input type="text" id="sideA" required
                        class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-black">
                </div>
                <div>
                    <label for="sideB" class="block text-sm font-medium mb-1">Lado B</label>
                    <input type="text" id="sideB" required
                        class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-black">
                </div>
                <div>
                    <label for="sideC" class="block text-sm font-medium mb-1">Lado C</label>
                    <input type="text" id="sideC" required
                        class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-black">
                </div>
                <div class="flex items-center gap-4">
                    <button type="submit"
                        class="flex-1 bg-black text-white rounded-md px-4 py-2 text-sm font-medium hover:bg-gray-800 transition-colors">
                        Verificar
                    </button>
                    <button type="button" id="clear-btn"
                        class="text-sm text-gray-500 hover:text-gray-900 font-medium transition-colors whitespace-nowrap">
                        Limpar
                    </button>
                </div>
            </form>
            <div id="error-message" class="mt-4 text-sm text-red-500 hidden"></div>
        </div>

        <!-- results -->
        <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
            <h2 class="text-xl font-semibold mb-6">Resultado</h2>
            <div class="space-y-4">
                <div class="flex justify-between items-center py-2 border-b border-gray-50">
                    <span class="text-sm text-gray-600">Forma um triângulo?</span>
                    <span id="is-triangle" class="font-medium text-gray-900">-</span>
                </div>
                <div class="flex justify-between items-center py-2 border-b border-gray-50">
                    <span class="text-sm text-gray-600">Tipo de triângulo</span>
                    <span id="triangle-type" class="font-medium text-gray-900">-</span>
                </div>
            </div>

        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
